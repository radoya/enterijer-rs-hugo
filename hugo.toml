# Multihost mode: every enabled language has its own baseURL (own domain).
defaultContentLanguage = 'sr'
title = "Enterijer.rs — Saveti za uređenje prostora"
theme = 'enterijer-theme'
copyright = '© Enterijer.rs'
enableRobotsTXT = true
enableGitInfo = true

[markup.goldmark.renderer]
  unsafe = true # allow raw HTML in markdown (contact form)

[params]
  author = "Enterijer.rs Tim"
  description = "Praktični enterijer u Srbiji i regionu — renoviranje, dekoracija, materijali, majstori."
  images = ["img/og-default.png"]
  keywords = ["enterijer", "renoviranje", "sredjivanje stana", "majstori", "materijali", "dekoracija"]
  mainSections = ["blog"]

[menu]
  [[menu.main]]
    name = "Početna"
    url = "/"
    weight = 10
  [[menu.main]]
    name = "Blog"
    url = "/blog/"
    weight = 20
  [[menu.main]]
    name = "Galerija"
    url = "/galerija/"
    weight = 30
  [[menu.main]]
    name = "Kontakt"
    url = "/kontakt/"
    weight = 40

[languages]
  [languages.sr]
    baseURL = 'https://enterijer.rs/'
    contentDir = 'content/sr'
    locale = 'sr'
    label = 'Srpski'
    title = "Enterijer.rs"
    weight = 10
    [languages.sr.params]
      subtitle = "Praktični enterijer"
    [languages.sr.menus]
      [[languages.sr.menus.main]]
        name = "Početna"
        url = "/"
        weight = 10
      [[languages.sr.menus.main]]
        name = "Blog"
        url = "/blog/"
        weight = 20
      [[languages.sr.menus.main]]
        name = "Galerija"
        url = "/galerija/"
        weight = 30
      [[languages.sr.menus.main]]
        name = "Kontakt"
        url = "/kontakt/"
        weight = 40

  [languages.en]
    baseURL = 'https://interior.enterijer.rs/'
    contentDir = 'content/en'
    locale = 'en'
    label = 'English'
    title = "Enterijer.rs"
    weight = 20
    [languages.en.params]
      subtitle = "Practical interior tips"
    [languages.en.menus]
      [[languages.en.menus.main]]
        name = "Home"
        url = "/"
        weight = 10
      [[languages.en.menus.main]]
        name = "Blog"
        url = "/blog/"
        weight = 20
      [[languages.en.menus.main]]
        name = "Gallery"
        url = "/galerija/"
        weight = 30
      [[languages.en.menus.main]]
        name = "Contact"
        url = "/kontakt/"
        weight = 40

  # NOTE: languages with `disabled = true` break Hugo multihost detection
  # (Hugo 0.163): the whole site silently falls back to single-host layout.
  # Future languages therefore stay fully commented out until they launch.
  # To enable one: uncomment its block, set the final baseURL, add the domain
  # to LANG_BY_HOST in worker/index.js, attach the custom domain to the Worker.

