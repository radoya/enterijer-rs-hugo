{{ define "main" }}
<div class="container">
  <header class="page-hero">
    {{ partial "breadcrumbs.html" . }}
    <h1>{{ .Title }}</h1>
    <p>{{ .Description | default .Site.Params.description }}</p>
  </header>
  {{ with .Content }}<div class="prose">{{ . }}</div>{{ end }}
  <div class="card-grid card-grid--featured">
    {{ range .Pages }}
      {{ partial "card.html" . }}
    {{ end }}
  </div>
</div>
{{ end }}
