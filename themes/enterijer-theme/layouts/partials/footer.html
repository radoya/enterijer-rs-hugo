<footer class="site-footer">
  <div class="container">
    <div>
      <h4>Enterijer.rs</h4>
      <p>{{ .Site.Params.description }}</p>
    </div>
    <nav aria-label="Footer">
      {{ range .Site.Menus.main }}
        <a href="{{ .URL | relLangURL }}">{{ .Name }}</a>
      {{ end }}
    </nav>
    <div>
      <h4>{{ i18n "follow_us" }}</h4>
      <nav aria-label="Social">
        <a href="https://instagram.com/enterijer.rs" target="_blank" rel="noopener">Instagram</a>
      </nav>
    </div>
    <div class="footer-legal">{{ .Site.Copyright }} {{ now.Year }} — {{ i18n "rights_reserved" }}</div>
  </div>
</footer>
