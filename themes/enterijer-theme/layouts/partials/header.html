<header class="site-header">
  <div class="container">
    <a class="brand" href="{{ "/" | relLangURL }}">enterijer<span>.rs</span></a>
    <nav class="nav" aria-label="Primary">
      {{ range .Site.Menus.main }}
        <a href="{{ .URL | relLangURL }}"{{ if $.IsMenuCurrent "main" . }} aria-current="page"{{ end }}>{{ .Name }}</a>
      {{ end }}
    </nav>
    <div class="lang-switch">
      {{ range .Translations }}
        <a href="{{ .Permalink }}">{{ .Language.LanguageName }}</a>
      {{ end }}
    </div>
  </div>
</header>
