<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
<meta name="description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<meta property="og:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }}{{ end }}">
<meta property="og:description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<meta property="og:type" content="website">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:image" content="{{ .Site.BaseURL }}{{ with .Site.Params.images }}{{ index . 0 }}{{ else }}img/og-default.png{{ end }}" />
<meta name="twitter:card" content="summary_large_image">
<link rel="canonical" href="{{ .Permalink }}">
{{ range .AllTranslations }}
<link rel="alternate" hreflang="{{ .Lang }}" href="{{ .Permalink }}" />
{{ end }}
<style>
:root{--bg:#0b0d11;--surface:#11131a;--border:#1e2030;--text:#e6e7eb;--muted:#8b8fa3;--accent:#4ade80;--accent2:#22c55e;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
*,*:before,*:after{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--bg);color:var(--text);line-height:1.55}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
img{max-width:100%;height:auto;display:block}
.container{max-width:1100px;margin:0 auto;padding:0 20px}
.site-header{border-bottom:1px solid var(--border);background:rgba(17,19,26,.85);backdrop-filter:blur(10px);position:sticky;top:0;z-index:50}
.site-header .container{display:flex;align-items:center;justify-content:space-between;height:60px}
.brand{font-weight:800;font-size:1.15rem;color:var(--text);letter-spacing:-0.02em}
.brand span{color:var(--accent)}
.nav a{color:var(--muted);font-size:.92rem;font-weight:500;margin-left:18px;padding:6px 0}
.nav a:hover,.nav a[aria-current]{color:var(--text)}
.lang-switch{display:flex;gap:8px;font-size:.82rem}
.lang-switch a{color:var(--muted)}.lang-switch a.active{color:var(--accent);font-weight:700}
.page-hero{padding:56px 0 36px;text-align:center}
.page-hero h1{font-size:clamp(1.8rem,4vw,2.6rem);margin:0 0 12px;letter-spacing:-0.03em;line-height:1.15}
.page-hero p{color:var(--muted);font-size:1.05rem;max-width:560px;margin:0 auto}
.btn{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#052e16;border-radius:10px;padding:10px 18px;font-weight:700;font-size:.95rem;border:none;cursor:pointer}
.btn:hover{filter:brightness(1.08);text-decoration:none}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-top:28px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;transition:transform .15s ease,border-color .15s}
.card:hover{border-color:var(--accent2);transform:translateY(-2px)}
.card h3{margin:0 0 8px;font-size:1.05rem}
.card p{color:var(--muted);font-size:.92rem;margin:0 0 12px}
.card .meta{color:var(--muted);font-size:.82rem}
.tag{display:inline-block;background:#141824;border:1px solid var(--border);color:var(--muted);padding:4px 10px;border-radius:20px;font-size:.78rem;margin-right:6px}
article{max-width:720px;margin:0 auto;padding:28px 0 48px}
article h1{font-size:clamp(1.6rem,3.5vw,2.2rem);margin:0 0 14px}
article time{color:var(--muted);font-size:.9rem;display:block;margin-bottom:18px}
.site-footer{border-top:1px solid var(--border);padding:24px 0;color:var(--muted);font-size:.85rem}
.site-footer .container{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
@media(max-width:640px){.page-hero{padding:36px 0 24px}.card-grid{grid-template-columns:1fr}}
</style>
